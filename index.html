<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiment 8 - DevOps Hosting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 300;
      margin-bottom: 20px;
      color: #e0e0e0;
    }

    .badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 50px;
      background: rgba(255,255,255,0.2);
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .steps {
      text-align: left;
      margin-top: 20px;
    }

    .step {
      background: rgba(255,255,255,0.15);
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .step:hover {
      transform: scale(1.03);
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #764ba2;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #f1f1f1;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #ddd;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Experiment 8</h1>
  <h2>DevOps: Hosting a Web Application</h2>

  <div class="badge">Successfully Deployed 🌐</div>

  <div class="steps">
    <div class="step">✅ Created HTML Web Application</div>
    <div class="step">✅ Initialized Git Repository</div>
    <div class="step">✅ Pushed Code to GitHub</div>
    <div class="step">✅ Deployed using Hosting Service</div>
    <div class="step">✅ Verified Live Application</div>
  </div>

  <button onclick="showMessage()">Click Me 🎉</button>

  <div class="footer">Hosted using DevOps Practices 💡</div>
</div>

<script>
  function showMessage() {
    alert("🎉 Your DevOps Hosting is Successful!");
  }
</script>

</body>
</html>
