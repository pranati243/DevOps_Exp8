<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiment 8 - DevOps Hosting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6f1f5;
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    h2 {
      font-size: 1rem;
      font-weight: 300;
      color: #a8c3cc;
      margin-bottom: 25px;
    }

    .pipeline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 30px 0;
    }

    .node {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: 0.3s;
    }

    .node:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.15);
    }

    .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, transparent, #7fd8ff, transparent);
      animation: flow 2s infinite linear;
    }

    @keyframes flow {
      from { background-position: 0; }
      to { background-position: 200px; }
    }

    .steps {
      text-align: left;
      margin-top: 20px;
    }

    .step {
      padding: 10px;
      margin: 6px 0;
      border-left: 2px solid #7fd8ff;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
    }

    button {
      margin-top: 25px;
      padding: 10px 22px;
      border-radius: 25px;
      border: none;
      background: #7fd8ff;
      color: #0f2027;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }

    button:hover {
      background: #a6e6ff;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #9bbac4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Pranat's Experiment 8</h1>
  <h2>DevOps: Hosting a Web Application</h2>

  <!-- Pipeline Graphic -->
  <div class="pipeline">
    <div class="node">Code</div>
    <div class="line"></div>
    <div class="node">Build</div>
    <div class="line"></div>
    <div class="node">Deploy</div>
    <div class="line"></div>
    <div class="node">Live</div>
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step">Created and structured the web application</div>
    <div class="step">Version control initialized and code pushed</div>
    <div class="step">Build and deployment configured</div>
    <div class="step">Application hosted and verified</div>
  </div>

  <button onclick="showMessage()">Check Status</button>

  <div class="footer">Deployed using DevOps workflow</div>
</div>

<script>
  function showMessage() {
    alert("Application successfully deployed and running.");
  }
</script>

</body>
</html>
